<style>
    body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; height: 100vh; width: 100vw; }
    #container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
    
    .eyes { display: flex; gap: 60px; margin-bottom: 30px; pointer-events: none; transition: 0.3s; }
    
    /* This wrapper handles the SQUINT */
    .eye-wrapper { transition: 0.3s; }
    .squint { transform: scaleY(0.2); }

    /* This handles the BLINK and COLOR */
    .eye { width: 60px; height: 60px; background: #fff; border-radius: 50%; transition: background 0.3s; }
    .blink { animation: blink 4s infinite; }
    .listening-glow { background: #00ff00 !important; box-shadow: 0 0 15px #00ff00; }

    @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
    
    #mouth { width: 50px; height: 10px; background: #fff; border-radius: 20px; transition: 0.1s; pointer-events: none; }
    #status { position: absolute; bottom: 30px; color: #444; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; }
    #speech-out { position: absolute; top: 60px; color: #fff; width: 85%; text-align: center; font-size: 1.1rem; }
    #controls { position: absolute; bottom: 60px; z-index: 5; color: #444; font-size: 0.7rem; }
</style>

<div id="container" onclick="listen()">
    <div id="speech-out">TAP TO WAKE</div>
    <div class="eyes">
        <div class="eye-wrapper"><div class="eye blink"></div></div>
        <div class="eye-wrapper"><div class="eye blink"></div></div>
    </div>
    <div id="mouth"></div>
    <div id="controls">
        <label><input type="checkbox" id="always-on"> ALWAYS LISTENING</label>
    </div>
    <div id="status">BRENDA v1.1</div>
</div>

<script>
    const mouth = document.getElementById('mouth');
    const speechOut = document.getElementById('speech-out');
    const status = document.getElementById('status');
    const alwaysOnToggle = document.getElementById('always-on');
    const eyeWrappers = document.querySelectorAll('.eye-wrapper');
    const eyes = document.querySelectorAll('.eye');
    
    let isTalking = false;
    let API_KEY = localStorage.getItem("gemini_key");

    // SETUP & SPEAK (Same as before)
    function setup() {
        if (!API_KEY) {
            API_KEY = prompt("Enter Gemini Key:");
            if (API_KEY) localStorage.setItem("gemini_key", API_KEY);
        }
        document.getElementById('overlay').style.display = 'none';
        speak("Brenda online.");
    }

    function speak(text) {
        isTalking = true;
        stopSquinting(); // Open eyes wide to talk
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance(text);
        msg.onstart = () => {
            status.innerText = "Talking...";
            mouthInterval = setInterval(() => {
                mouth.style.height = Math.random() * 35 + "px";
            }, 100);
        };
        msg.onend = () => {
            isTalking = false;
            clearInterval(mouthInterval);
            mouth.style.height = "10px";
            if (alwaysOnToggle.checked) setTimeout(listen, 400);
        };
        window.speechSynthesis.speak(msg);
    }

    // SPEECH RECOGNITION
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognizer = new Recognition();
    recognizer.continuous = true; 
    recognizer.interimResults = false;

    function startSquinting() {
        eyeWrappers.forEach(el => el.classList.add('squint'));
        eyes.forEach(el => el.classList.add('listening-glow'));
    }

    function stopSquinting() {
        eyeWrappers.forEach(el => el.classList.remove('squint'));
        eyes.forEach(el => el.classList.remove('listening-glow'));
    }

    recognizer.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        
        if (alwaysOnToggle.checked) {
            if (transcript.includes("brenda")) {
                stopSquinting();
                askGemini(transcript.replace("brenda", ""));
            }
        } else {
            stopSquinting();
            askGemini(transcript);
        }
    };

    recognizer.onend = () => {
        if (alwaysOnToggle.checked && !isTalking) listen();
        else stopSquinting();
    }

    function listen() {
        if (isTalking) return;
        try {
            recognizer.start();
            status.innerText = "Listening...";
            startSquinting();
        } catch(e) {}
    }

    async function askGemini(question) {
        status.innerText = "Thinking...";
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Short witty answer: " + question }] }] })
            });
            const data = await response.json();
            speak(data.candidates[0].content.parts[0].text);
        } catch (e) { speak("Connection error."); }
    }
</script>
