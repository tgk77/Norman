<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brenda AI</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; height: 100vh; width: 100vw; }
        #container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        
        .eyes { display: flex; gap: 60px; margin-bottom: 30px; pointer-events: none; }
        .eye { width: 60px; height: 60px; background: #fff; border-radius: 50%; transition: 0.1s; }
        #mouth { width: 50px; height: 10px; background: #fff; border-radius: 20px; transition: 0.1s; pointer-events: none; }

        .blink { animation: blink 4s infinite; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        
        #status { position: absolute; bottom: 30px; color: #444; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; pointer-events: none; }
        #speech-out { position: absolute; top: 60px; color: #fff; width: 85%; text-align: center; font-size: 1.1rem; line-height: 1.4; opacity: 0.8; font-weight: 300; pointer-events: none; }
        
        #controls { position: absolute; bottom: 60px; z-index: 5; color: #444; font-size: 0.7rem; letter-spacing: 1px; }
        
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10; display:flex; justify-content:center; align-items:center; }
        button { padding: 20px 40px; font-size: 1.2rem; background: #fff; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <button onclick="setup()">WAKE UP BRENDA</button>
</div>

<div id="container" onclick="listen()">
    <div id="speech-out">TAP ANYWHERE TO TALK</div>
    <div class="eyes">
        <div class="eye blink"></div>
        <div class="eye blink"></div>
    </div>
    <div id="mouth"></div>
    
    <div id="controls">
        <label><input type="checkbox" id="always-on"> ALWAYS LISTENING</label>
    </div>
    
    <div id="status">BRENDA v1.0 // STANDBY</div>
</div>

<script>
    const mouth = document.getElementById('mouth');
    const speechOut = document.getElementById('speech-out');
    const status = document.getElementById('status');
    const alwaysOnToggle = document.getElementById('always-on');
    
    let mouthInterval;
    let isTalking = false;
    let API_KEY = localStorage.getItem("gemini_key");

    function setup() {
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(e => console.log("Fullscreen blocked"));
        }

        if (!API_KEY) {
            API_KEY = prompt("Please enter your Gemini API Key:");
            if (API_KEY) { localStorage.setItem("gemini_key", API_KEY); }
        }

        document.getElementById('overlay').style.display = 'none';
        speak("Hello! I am Brenda. Ready to help.");
    }

    function speak(text) {
        isTalking = true;
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.2; 
        msg.pitch = 1.4; 

        msg.onstart = () => {
            status.innerText = "Talking...";
            mouthInterval = setInterval(() => {
                mouth.style.height = Math.random() * 35 + "px";
                mouth.style.width = (40 + Math.random() * 20) + "px";
            }, 100);
        };

        msg.onend = () => {
            isTalking = false;
            clearInterval(mouthInterval);
            mouth.style.height = "10px";
            mouth.style.width = "50px";
            status.innerText = "Waiting...";
            
            // Loop back to listening if Always-On is active
            if (alwaysOnToggle.checked) {
                setTimeout(listen, 500); 
            }
        };

        window.speechSynthesis.speak(msg);
    }

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognizer = new Recognition();
    recognizer.continuous = false; // We manage continuity ourselves for better accuracy

    recognizer.onresult = (event) => {
        const result = event.results[0][0];
        const transcript = result.transcript.toLowerCase();
        const confidence = result.confidence;

        // If Always-On is ON, check for wake word. If OFF, just respond to everything.
        if (alwaysOnToggle.checked) {
            if (transcript.includes("brenda") && confidence > 0.8) {
                let cleanQuestion = transcript.replace("brenda", "").trim();
                speechOut.innerText = `You: "${cleanQuestion}"`;
                askGemini(cleanQuestion);
            } else {
                console.log("Wake word not detected. Listening again...");
                // Handled by onend to prevent recursion stack errors
            }
        } else {
            speechOut.innerText = `You: "${transcript}"`;
            askGemini(transcript);
        }
    };

    recognizer.onend = () => {
        // Automatically restart if Always Listening is checked and Brenda isn't talking
        if (alwaysOnToggle.checked && !isTalking) {
            listen();
        }
    };

    function listen() {
        if (isTalking) return; 
        try { 
            recognizer.start(); 
            status.innerText = "Listening..."; 
        } catch(e) {}
    }

    async function askGemini(question) {
        status.innerText = "Thinking...";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "You are a tiny robot named Brenda. Keep answers under 20 words. User says: " + question }] }]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const aiText = data.candidates[0].content.parts[0].text;
            speak(aiText);
        } catch (error) {
            console.error(error);
            speak("I'm having trouble connecting.");
        }
    }
</script>
</body>
</html>
