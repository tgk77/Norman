<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brenda AI</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; height: 100vh; width: 100vw; user-select: none; }
        #container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        
        /* Layout */
        .eyes { display: flex; gap: 60px; margin-bottom: 30px; pointer-events: none; }
        .eye-wrapper { transition: transform 0.3s ease; }
        
        /* THE EXPRESSIONS (Wrappers handle scaling to avoid breaking the blink animation) */
        .squint { transform: scaleY(0.25); }
        .surprised { transform: scale(1.4); }
        
        /* THE EXPRESSIONS (Eyes handle shapes and colors) */
        .eye { width: 60px; height: 60px; background: #fff; border-radius: 50%; transition: all 0.3s ease; }
        .listening-glow { background: #00ff00 !important; box-shadow: 0 0 20px #00ff00; }
        
        /* Emotion Shapes */
        .happy { border-radius: 60px 60px 15px 15px; background: #ffcc00; box-shadow: 0 0 15px #ffcc00; } /* Yellow arches */
        .sad { border-radius: 20px 20px 60px 60px; background: #00ccff; box-shadow: 0 0 15px #00ccff; }   /* Blue droops */
        .angry { border-radius: 10px 60px 10px 10px; background: #ff0000; box-shadow: 0 0 15px #ff0000; }  /* Red slanted */

        .blink { animation: blink 4s infinite; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        
        #mouth { width: 50px; height: 10px; background: #fff; border-radius: 20px; transition: 0.1s; pointer-events: none; }
        #status { position: absolute; bottom: 30px; color: #444; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; }
        #speech-out { position: absolute; top: 60px; color: #fff; width: 85%; text-align: center; font-size: 1.1rem; opacity: 0.8; }
        
        #controls { position: absolute; bottom: 60px; z-index: 5; color: #666; font-size: 0.7rem; display: flex; flex-direction: column; gap: 15px; align-items: center;}
        
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10; display:flex; justify-content:center; align-items:center; }
        button { padding: 20px 40px; font-size: 1.2rem; background: #fff; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .small-btn { padding: 8px 15px; font-size: 0.6rem; background: #222; color: #aaa; }
    </style>
</head>
<body>

<div id="overlay">
    <button onclick="setup()">WAKE UP BRENDA</button>
</div>

<div id="container" onclick="listen()">
    <div id="speech-out">TAP TO TALK</div>
    <div class="eyes">
        <div class="eye-wrapper"><div class="eye blink"></div></div>
        <div class="eye-wrapper"><div class="eye blink"></div></div>
    </div>
    <div id="mouth"></div>
    
    <div id="controls">
        <label><input type="checkbox" id="always-on"> ALWAYS LISTENING</label>
        <button class="small-btn" onclick="resetKey(event)">RESET API KEY</button>
    </div>
    
    <div id="status">BRENDA v1.4 // STANDBY</div>
</div>

<script>
    const mouth = document.getElementById('mouth');
    const speechOut = document.getElementById('speech-out');
    const status = document.getElementById('status');
    const alwaysOnToggle = document.getElementById('always-on');
    const eyeWrappers = document.querySelectorAll('.eye-wrapper');
    const eyes = document.querySelectorAll('.eye');
    
    let isTalking = false;
    let isThinking = false;
    let mouthInterval;
    let API_KEY = localStorage.getItem("gemini_key");

    function setup() {
        if (!API_KEY) {
            API_KEY = prompt("Enter Gemini API Key:");
            if (API_KEY) localStorage.setItem("gemini_key", API_KEY);
        }
        document.getElementById('overlay').style.display = 'none';
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(e => console.log("Fullscreen ignored"));
        }
        speak("Brenda online. All systems green.");
    }

    function resetKey(event) {
        event.stopPropagation();
        localStorage.removeItem("gemini_key");
        alert("Key deleted. Refresh the page.");
        location.reload();
    }

    // --- VISUAL CONTROLS ---
    function resetFace() {
        eyeWrappers.forEach(el => el.className = 'eye-wrapper');
        eyes.forEach(el => el.className = 'eye blink');
    }

    function startSquinting() {
        resetFace();
        eyeWrappers.forEach(el => el.classList.add('squint'));
        eyes.forEach(el => el.classList.add('listening-glow'));
    }

    function setEmotion(text) {
        resetFace(); // Clear old emotions first
        const t = text.toLowerCase();
        
        // The Keyword Emotion Engine
        if (t.includes('sorry') || t.includes('sad') || t.includes('apologize') || t.includes('unfortunately')) {
            eyes.forEach(e => e.classList.add('sad'));
        } else if (t.includes('angry') || t.includes('mad') || t.includes('hate') || t.includes('stop')) {
            eyes.forEach(e => e.classList.add('angry'));
        } else if (t.includes('wow') || t.includes('oh!') || t.includes('really') || t.includes('whoa')) {
            eyeWrappers.forEach(e => e.classList.add('surprised'));
        } else if (t.includes('happy') || t.includes('great') || t.includes('yay') || t.includes('love') || t.includes('haha') || t.includes('!')) {
            eyes.forEach(e => e.classList.add('happy'));
        }
        // If no keywords match, she just stays neutral.
    }

    // --- LOGIC ---
    function speak(text) {
        isTalking = true;
        isThinking = false;
        
        try { recognizer.abort(); } catch(e) {} 

        // Analyze the text and set the face BEFORE she talks
        setEmotion(text);

        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.1;
        msg.pitch = 1.3;

        msg.onstart = () => {
            status.innerText = "Talking...";
            mouthInterval = setInterval(() => {
                mouth.style.height = Math.random() * 30 + "px";
            }, 100);
        };

        msg.onend = () => {
            isTalking = false;
            clearInterval(mouthInterval);
            mouth.style.height = "10px";
            status.innerText = "Standby";
            resetFace(); // Go back to normal after speaking
            if (alwaysOnToggle.checked) setTimeout(listen, 600);
        };
        window.speechSynthesis.speak(msg);
    }

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognizer = new Recognition();
    recognizer.continuous = true;
    recognizer.interimResults = false;

    recognizer.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        
        if (alwaysOnToggle.checked) {
            if (transcript.includes("brenda")) {
                const question = transcript.split("brenda").pop().trim();
                if (question.length > 0) {
                    speechOut.innerText = `You: "${question}"`;
                    askGemini(question);
                } else {
                    speechOut.innerText = "You: Brenda?";
                    speak("Yes?");
                }
            }
        } else {
            speechOut.innerText = `You: "${transcript}"`;
            askGemini(transcript);
        }
    };

    recognizer.onend = () => {
        if (alwaysOnToggle.checked && !isTalking && !isThinking) {
            listen();
        } else if (!isTalking && !isThinking) {
            resetFace();
        }
    };

    function listen() {
        if (isTalking || isThinking) return;
        try {
            recognizer.start();
            status.innerText = "Listening...";
            startSquinting();
        } catch(e) {
            startSquinting();
        }
    }

    async function askGemini(question) {
        if (!question) return;
        isThinking = true;
        status.innerText = "Thinking...";
        resetFace(); // Neutral face while thinking
        
        try { recognizer.abort(); } catch(e) {} 

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "You are Brenda, a witty and cute tiny robot. Answer in under 20 words. User says: " + question }] }] })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            speak(data.candidates[0].content.parts[0].text);
        } catch (e) {
            speak("Error. My brain hurts.");
            isThinking = false;
        }
    }
</script>
</body>
</html>
