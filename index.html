<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Stack-chan</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; height: 100vh; width: 100vw; }
        #container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        
        /* Face Styling */
        .eyes { display: flex; gap: 60px; margin-bottom: 30px; pointer-events: none; }
        .eye { width: 60px; height: 60px; background: #fff; border-radius: 50%; transition: 0.1s; }
        #mouth { width: 50px; height: 10px; background: #fff; border-radius: 20px; transition: 0.1s; pointer-events: none; }

        /* Animations */
        .blink { animation: blink 4s infinite; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        
        /* Text UI */
        #status { position: absolute; bottom: 30px; color: #444; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; pointer-events: none; }
        #speech-out { position: absolute; top: 60px; color: #fff; width: 85%; text-align: center; font-size: 1.1rem; line-height: 1.4; opacity: 0.8; font-weight: 300; pointer-events: none; }
        
        /* Overlay for Start */
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10; display:flex; justify-content:center; align-items:center; }
        button { padding: 20px 40px; font-size: 1.2rem; background: #fff; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <button onclick="setup()">WAKE UP</button>
</div>

<div id="container" onclick="listen()">
    <div id="speech-out">TAP ANYWHERE TO TALK</div>
    <div class="eyes">
        <div class="eye blink"></div>
        <div class="eye blink"></div>
    </div>
    <div id="mouth"></div>
    <div id="status">AI BOT v1.0 // STANDBY</div>
</div>

<script>
    const mouth = document.getElementById('mouth');
    const speechOut = document.getElementById('speech-out');
    const status = document.getElementById('status');
    
    // 1. YOUR API KEY (No braces needed here)
    const API_KEY = "AIzaSyAqpNL10AYzBzwyc2BuXMG-2nBbquZiqX0";

    let mouthInterval;
    let isTalking = false;

    function setup() {
        document.getElementById('overlay').style.display = 'none';
        speak("Hi! I am Brenda.");
    }

    function speak(text) {
        isTalking = true;
        window.speechSynthesis.cancel(); 
        
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.2; 
        msg.pitch = 1.4; 

        msg.onstart = () => {
            status.innerText = "Talking...";
            mouthInterval = setInterval(() => {
                mouth.style.height = Math.random() * 35 + "px";
                mouth.style.width = (40 + Math.random() * 20) + "px";
            }, 100);
        };

        msg.onend = () => {
            isTalking = false;
            clearInterval(mouthInterval);
            mouth.style.height = "10px";
            mouth.style.width = "50px";
            status.innerText = "Waiting for you...";
        };

        window.speechSynthesis.speak(msg);
    }

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Recognition) {
        alert("Please use Chrome on Android for Speech support.");
    }
    
    const recognizer = new Recognition();
    recognizer.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        speechOut.innerText = `You: "${transcript}"`;
        askGemini(transcript);
    };

    function listen() {
        if (isTalking) return; 
        try { 
            recognizer.start(); 
            status.innerText = "Listening..."; 
        } catch(e) {}
    }

    // 2. THE FIXED BRAIN FUNCTION
    async function askGemini(question) {
        status.innerText = "Thinking...";
        
        // FIXED: Using the variable and the 'latest' stable model name
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ text: "You are a tiny robot named Brenda. You are witty and cute. Keep answers under 20 words. User says: " + question }] 
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                console.error(data.error);
                speak("Brain error: " + data.error.message);
                return;
            }

            const aiText = data.candidates[0].content.parts[0].text;
            speak(aiText);
        } catch (error) {
            console.error(error);
            speak("I'm having trouble connecting.");
        }
    }
</script>
